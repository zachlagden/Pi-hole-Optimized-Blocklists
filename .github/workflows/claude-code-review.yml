name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for the Pi-hole-Optimized-Blocklists project.

            ## What to check

            ### For domain additions (`custom/*.txt` or `whitelist.txt` changes):
            - Is the domain format valid? (lowercase, no protocol, no trailing dot, has a TLD)
            - Is the domain placed in the correct category/section?
            - Is there a linked issue explaining why?
            - Is the domain a duplicate of an existing entry?
            - For whitelist additions: could this domain plausibly be a false positive?
            - For blocklist additions: does the evidence support blocking?

            ### For `blocklists.conf` changes:
            - Is the URL valid and accessible?
            - Is the `url|name|category` format correct?
            - Is the category one of: comprehensive, malicious, advertising, tracking, suspicious, nsfw?
            - Is the name unique?

            ### For workflow or config changes:
            - Are there any security concerns (exposed secrets, excessive permissions)?
            - Do the changes follow the existing patterns?

            ### For all PRs:
            - Does the PR reference an issue where appropriate?
            - Is the commit message format correct? (`type(scope): description`)
            - Are changes minimal and focused?

            Be concise. Flag issues clearly with severity (error/warning/suggestion).
